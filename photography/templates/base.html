<script>
// 1. MAKE FUNCTIONS GLOBALLY AVAILABLE IMMEDIATELY
window.toggleMobileMenu = function() {
    const navCenter = document.querySelector(".nav-center");
    if (navCenter) {
        navCenter.classList.toggle("open");
    }
};

window.openFollowup = function() {
    const panel = document.getElementById("followupPanel");
    if (panel) {
        panel.classList.add("open");
        loadFollowups();
    }
};

window.closeFollowup = function() {
    const panel = document.getElementById("followupPanel");
    if (panel) {
        panel.classList.remove("open");
    }
};

// 2. RUN SETUP ON PAGE LOAD
document.addEventListener("DOMContentLoaded", () => {
    
    // Auto-detect the active link based on the current URL path
    const currentPath = window.location.pathname;
    const navItems = document.querySelectorAll(".nav-item");

    // Clear any hardcoded active states
    navItems.forEach(item => item.classList.remove("active"));

    // Apply active state dynamically
    navItems.forEach(item => {
        const href = item.getAttribute("href");
        if (!href || href === "#") return;

        // Exact match (useful for root URL '/')
        if (currentPath === href) {
            item.classList.add("active");
        } 
        // Partial match for subdirectories
        else if (href !== "/" && currentPath.startsWith(href)) {
            item.classList.add("active");
        }
    });

    // Close mobile menu when clicking a link
    navItems.forEach(item => {
        item.addEventListener("click", () => {
            const navCenter = document.querySelector(".nav-center");
            if (navCenter) navCenter.classList.remove("open");
        });
    });

    // Load notification badge on load
    loadFollowups(); 
});

// ===============================
// FOLLOWUP PANEL LOGIC
// ===============================
let followupData = {};
let activeTab = "today";

function loadFollowups() {
    fetch("/followups/data/")
        .then(res => {
            if (!res.ok) throw new Error("Network response was not ok");
            return res.json();
        })
        .then(data => {
            followupData = data;
            
            // PANEL COUNTS (Add safety checks in case elements don't exist)
            const elTotal = document.getElementById("followupTotal");
            const elOverdue = document.getElementById("countOverdue");
            const elToday = document.getElementById("countToday");
            const elUpcoming = document.getElementById("countUpcoming");

            if (elTotal) elTotal.innerText = data.counts.total;
            if (elOverdue) elOverdue.innerText = data.counts.overdue;
            if (elToday) elToday.innerText = data.counts.today;
            if (elUpcoming) elUpcoming.innerText = data.counts.upcoming;

            // 🔔 BADGE UPDATE
            const badge = document.getElementById("followupBadge");
            if (badge) {
                const total = data.counts.total;
                if (total > 0) {
                    badge.innerText = total > 9 ? "9+" : total;
                    badge.classList.add("show");
                } else {
                    badge.classList.remove("show");
                }
            }

            renderList();
        })
        .catch(err => console.log("Followups endpoint not ready/found:", err));
}

window.switchTab = function(tab) {
    activeTab = tab;
    document.querySelectorAll(".followup-tabs button").forEach(b => b.classList.remove("active"));
    
    // Check if event exists (fixes potential error)
    if (window.event && window.event.target) {
        window.event.target.classList.add("active");
    }
    renderList();
};

function renderList() {
    const list = document.getElementById("followupList");
    if (!list) return;

    list.innerHTML = "";

    if (!followupData[activeTab] || !followupData[activeTab].length) {
        list.innerHTML = `<div class="text-center text-[#777] mt-[90px] text-[14px] animate-[fadeIn_0.3s_ease]">🎉 No follow-ups here</div>`;
        return;
    }

    followupData[activeTab].forEach(lead => {
        list.innerHTML += `
            <div class="bg-white rounded-[18px] p-[16px] mb-[16px] shadow-[0_12px_30px_rgba(0,0,0,.08)] transition-all duration-250 hover:-translate-y-[4px] hover:shadow-[0_18px_40px_rgba(0,0,0,.14)]">
                <h4 class="m-[0_0_6px] text-[16px] font-semibold">${lead.client_name}</h4>
                <p class="text-[13px] text-[#555] m-[4px_0]">📞 ${lead.phone}</p>
                <p class="text-[13px] text-[#555] m-[4px_0]">📅 ${lead.event_type}</p>
                <p class="text-[13px] text-[#555] m-[4px_0]">⏰ ${lead.follow_up_date}</p>
                <div class="flex gap-[10px] mt-[12px]">
                    <button class="flex-1 p-[9px] rounded-[10px] border-none cursor-pointer text-[13px] font-semibold transition-all duration-200 hover:-translate-y-[2px] hover:shadow-[0_6px_14px_rgba(0,0,0,.18)] bg-[#f1f1f1] text-black" onclick="window.location.href='/leads/?open_lead=${lead.id}'">Open Lead</button>
                    <button class="flex-1 p-[9px] rounded-[10px] border-none cursor-pointer text-[13px] font-semibold transition-all duration-200 hover:-translate-y-[2px] hover:shadow-[0_6px_14px_rgba(0,0,0,.18)] bg-[#9e2a2f] text-white" onclick="markDone(${lead.id})">Mark Done</button>
                </div>
            </div>
        `;
    });
}

window.markDone = function(id) {
    const csrfEl = document.getElementById("csrf_token");
    if (!csrfEl) return;
    
    fetch("/followups/done/", {
        method: "POST",
        headers: {
            "X-CSRFToken": csrfEl.value,
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: new URLSearchParams({ lead_id: id })
    }).then(() => loadFollowups());
};
</script>
